name: Release

on:
  # Allows manually re-running the release workflow after a workflow fix
  # (the push trigger below ignores .github/workflows/release.yml changes).
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - '.changeset/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Changesets needs full git history

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          # `changeset publish` (via `npm run release`) is idempotent: it skips
          # versions already on the registry, so non-version-bump triggers
          # (e.g. Dependabot editing package.json) exit cleanly instead of
          # failing with "You cannot publish over the previously published version".
          # changesets/action creates GitHub Releases by default
          # (createGithubReleases: true), so no separate release step is needed.
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node needs a token placeholder to write .npmrc; OIDC from
          # id-token: write is what actually authenticates npm trusted publishing.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # OpenSSF Scorecard: Signed-Releases. Changesets creates GitHub Releases
      # with no attached artifacts, which Scorecard treats as "no releases".
      # Attach a cosign keyless signature (+ Sigstore bundle) of the published
      # tarball so releasesAreSigned detects a signed artifact.
      - name: Install cosign
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign published tarball and attach to GitHub release
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          VER="$(node -p "require('./package.json').version")"
          TARBALL="pi-pulse-${VER}.tgz"
          # Fetch the exact artifact published to npm. The registry can take a
          # few seconds to propagate a just-published version, so retry briefly.
          for i in $(seq 1 12); do
            if npm pack "pi-pulse@${VER}"; then break; fi
            echo "npm registry has not propagated ${VER} yet (attempt ${i}/12); retrying in 10s..."
            sleep 10
          done
          test -f "${TARBALL}"
          # Keyless signature via Sigstore (OIDC); requires id-token: write.
          cosign sign-blob --yes \
            --bundle "${TARBALL}.sigstore.json" \
            --output-signature "${TARBALL}.sig" \
            "${TARBALL}"
          gh release upload "v${VER}" \
            "${TARBALL}" "${TARBALL}.sig" "${TARBALL}.sigstore.json" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
