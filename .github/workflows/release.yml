name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - '.changeset/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Changesets needs full git history

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2e509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # `changeset publish` (via `npm run release`) is idempotent: it skips
          # versions already on the registry, so non-version-bump triggers
          # (e.g. Dependabot editing package.json) exit cleanly instead of
          # failing with "You cannot publish over the previously published version".
          # changesets/action creates GitHub Releases by default
          # (createGithubReleases: true), so no separate release step is needed.
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node needs a token placeholder to write .npmrc; OIDC from
          # id-token: write is what actually authenticates npm trusted publishing.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
